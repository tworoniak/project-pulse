<div class="kpi-grid" role="list" aria-label="Project KPI summary">

  <div class="kpi-card kpi-card--accent" role="listitem">
    <div class="kpi-icon" aria-hidden="true">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
    </div>
    <span class="kpi-value">{{ totalProjects() }}</span>
    <span class="kpi-label">Total Projects</span>
  </div>

  <div class="kpi-card kpi-card--warning" role="listitem">
    <div class="kpi-icon" aria-hidden="true">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    </div>
    <span class="kpi-value">{{ inProgress() }}</span>
    <span class="kpi-label">In Progress</span>
  </div>

  <div class="kpi-card kpi-card--danger" role="listitem">
    <div class="kpi-icon" aria-hidden="true">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>
    <span class="kpi-value">{{ atRisk() }}</span>
    <span class="kpi-label">At Risk</span>
  </div>

  <div class="kpi-card kpi-card--success" role="listitem">
    <div class="kpi-icon" aria-hidden="true">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
    </div>
    <span class="kpi-value">{{ avgProgress() }}%</span>
    <span class="kpi-label">Avg Progress</span>
  </div>

</div>
