<div class="shell" [class.shell--sidebar-collapsed]="!sidebarOpen()">
  <app-header
    class="shell__header"
    [sidebarOpen]="sidebarOpen()"
    (toggleSidebar)="toggleSidebar()"
  />
  <app-sidebar
    class="shell__sidebar"
    [open]="sidebarOpen()"
  />
  <main class="shell__content">
    <router-outlet />
  </main>
</div>
